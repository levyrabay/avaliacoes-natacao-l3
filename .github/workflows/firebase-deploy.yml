name: Deploy Firebase Hosting
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools
      - name: Preparar credenciais
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$HOME/sa.json"
      - name: Publicar no Firebase Hosting
        run: firebase deploy --only hosting --project avaliacoes-natacao-l3 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/sa.json
